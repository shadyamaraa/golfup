name: Shine Redesign Preview

# Deploys this branch to the fixed `shine-redesign` Firebase Hosting preview
# channel (https://golfup-app--shine-redesign-…web.app) on every push, and on
# manual trigger from the Actions tab.
on:
  push:
    branches:
      - 'claude/beldey-nguk4'
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: golfup-app
          channelId: shine-redesign
          expires: 30d
