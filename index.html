<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UB Golf - гольфчдын тоглолт зохион байгуулах апп" />
  <meta property="og:title" content="UB Golf V2" />
  <meta property="og:description" content="Гольфчдын тоглолт зохион байгуулах апп" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/no-preview.png" />

  <title>UB Golf V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/UBGolf_web_favicon.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#08203A" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/redesign.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-inner">
        <a href="#/" class="logo" id="logo-link">
          <div class="logo-img" role="img" aria-label="UB Golf"></div>
        </a>
        <nav class="header-nav">
          <button id="lang-toggle" class="btn-icon" title="Language">
            <span id="lang-label">MN</span>
          </button>
          <div id="user-info" class="user-info hidden" style="display:flex; align-items:center;">
            <a href="#/users" id="users-link" class="btn-icon" title="Хэрэглэгчид" style="margin-right: 8px; text-decoration:none; display:flex; align-items:center;">👥</a>
            <a href="#/admin" id="admin-link" class="btn-icon hidden" title="Admin панель" style="margin-right: 8px; text-decoration:none; display:flex; align-items:center;">🛡️</a>
            <div id="profile-trigger" style="display:flex; align-items:center; gap:8px; cursor:pointer;" title="Миний бүртгэл">
              <span id="user-avatar" class="user-avatar"></span>
              <span id="user-name-display"></span>
            </div>
            <button id="logout-btn" class="btn-icon btn-logout-icon" title="Гарах" style="margin-left: 12px;"></button>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Views will be rendered here -->
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Bottom navigation (mobile-first; shown when logged in, hidden in kiosk) -->
    <nav id="bottom-nav" class="bottom-nav hidden">
      <a href="#/" class="bn-item" data-route="home"><span class="bn-icon">🏠</span><span class="bn-label" id="bn-home"></span></a>
      <a href="#/create" class="bn-item" data-route="create"><span class="bn-icon">➕</span><span class="bn-label" id="bn-create"></span></a>
      <a href="#/menu" class="bn-item" data-route="food"><span class="bn-icon">🍽️</span><span class="bn-label" id="bn-food"></span></a>
      <button type="button" class="bn-item" id="bn-profile-btn" data-route="profile"><span class="bn-icon">👤</span><span class="bn-label" id="bn-profile"></span></button>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
