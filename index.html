<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UB Golf - гольфчдын тоглолт зохион байгуулах апп" />
  <meta property="og:title" content="UB Golf V2" />
  <meta property="og:description" content="Гольфчдын тоглолт зохион байгуулах апп" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/no-preview.png" />

  <title>UB Golf V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/UBGolf_web_favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#F3EFE4" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/tokens-redesign.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-inner">
        <a href="#/" class="logo" id="logo-link">
          <div class="logo-img" role="img" aria-label="UB Golf"></div>
        </a>
        <nav class="header-nav">
          <div id="user-info" class="user-info hidden" style="display:flex; align-items:center; gap:8px;">
            <a href="#/users" id="users-link" class="btn-icon" title="Хэрэглэгчид" style="text-decoration:none; display:flex; align-items:center;"><span data-icon="members" data-size="18"></span></a>
            <a href="#/admin" id="admin-link" class="btn-icon hidden" title="Admin панель" style="text-decoration:none; display:flex; align-items:center;"><span data-icon="settings" data-size="18"></span></a>
            <button id="header-bell" class="btn-icon hg-bell" title="Мэдэгдэл"><span data-icon="alerts" data-size="18"></span><span id="header-bell-badge" class="hg-badge hidden"></span></button>
            <button id="header-avatar" class="user-avatar" title="Профайл"></button>
            <button id="logout-btn" class="btn-icon btn-logout-icon" title="Гарах"></button>
          </div>
        </nav>
      </div>
    </header>

    <!-- Global sponsor banner (shown on all user-facing pages) -->
    <div id="global-sponsor" class="global-sponsor hidden"></div>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Views will be rendered here -->
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Bottom navigation (mobile-first; shown when logged in, hidden in kiosk) -->
    <nav id="bottom-nav" class="bottom-nav hidden">
      <a href="#/" class="bn-item" data-route="home"><span class="bn-icon" data-icon="home" data-size="22"></span><span class="bn-label" id="bn-home"></span></a>
      <a href="#/games" class="bn-item" data-route="games"><span class="bn-icon" data-icon="play" data-size="22"></span><span class="bn-label" id="bn-games"></span></a>
      <a href="#/create" class="bn-item bn-fab-item" data-route="create"><span class="bn-fab" data-icon="create" data-size="26"></span></a>
      <a href="#/services" class="bn-item" data-route="services"><span class="bn-icon" data-icon="services" data-size="22"></span><span class="bn-label" id="bn-services"></span></a>
      <a href="#/orders" class="bn-item" data-route="orders"><span class="bn-icon" data-icon="bookings" data-size="22"></span><span class="bn-label" id="bn-orders"></span></a>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
