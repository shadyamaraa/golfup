<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UB Golf - гольфчдын тоглолт зохион байгуулах апп" />
  <meta property="og:title" content="UB Golf V2" />
  <meta property="og:description" content="Гольфчдын тоглолт зохион байгуулах апп" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="" />
  <title>UB Golf V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/UBGolf_web_favicon.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-inner">
        <a href="#/" class="logo" id="logo-link">
          <div class="logo-img" role="img" aria-label="UB Golf"></div>
        </a>
        <nav class="header-nav">
          <button id="lang-toggle" class="btn-icon" title="Language">
            <span id="lang-label">MN</span>
          </button>
          <div id="user-info" class="user-info hidden" style="display:flex; align-items:center;">
            <a href="#/users" id="users-link" class="btn-icon" title="Хэрэглэгчид" style="margin-right: 8px; text-decoration:none; display:flex; align-items:center;">👥</a>
            <a href="#/admin" id="admin-link" class="btn-icon hidden" title="Admin панель" style="margin-right: 8px; text-decoration:none; display:flex; align-items:center;">🛡️</a>
            <div id="profile-trigger" style="display:flex; align-items:center; gap:8px; cursor:pointer;" title="Миний бүртгэл">
              <span id="user-avatar" class="user-avatar"></span>
              <span id="user-name-display"></span>
            </div>
            <button id="logout-btn" class="btn-icon btn-logout-icon" title="Гарах" style="margin-left: 12px;"></button>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Views will be rendered here -->
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- FAB: create game -->
    <button id="fab-create" class="hidden" title="Тоглолт үүсгэх" aria-label="Тоглолт үүсгэх">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="hidden">
      <button data-nav="home">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span data-i18n="navHome">Нүүр</span>
      </button>
      <button data-nav="games">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span data-i18n="navGames">Тоглолт</span>
      </button>
      <button data-nav="notifications">
        <span id="bnav-notif-dot" class="bnav-dot"></span>
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span data-i18n="navNotifications">Мэдэгдэл</span>
      </button>
      <button data-nav="profile">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span data-i18n="navProfile">Профайл</span>
      </button>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
