<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UB Golf - гольфчдын тоглолт зохион байгуулах апп" />
  <title>⛳ UB Golf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛳</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-inner">
        <a href="#/" class="logo" id="logo-link">
          <span class="logo-icon">⛳</span>
          <span class="logo-text">UB Golf</span>
        </a>
        <nav class="header-nav">
          <button id="lang-toggle" class="btn-icon" title="Language">
            <span id="lang-label">MN</span>
          </button>
          <div id="user-info" class="user-info hidden" style="display:flex; align-items:center;">
            <a href="#/users" id="users-link" class="btn-icon" title="Хэрэглэгчид" style="margin-right: 8px; text-decoration:none; display:flex; align-items:center;">👥</a>
            <div id="profile-trigger" style="display:flex; align-items:center; gap:8px; cursor:pointer;" title="Миний бүртгэл">
              <span id="user-avatar" class="user-avatar"></span>
              <span id="user-name-display"></span>
            </div>
            <button id="logout-btn" class="btn-icon btn-logout-icon" title="Гарах" style="margin-left: 12px;"></button>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Views will be rendered here -->
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
