<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="ubG-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ed04a"/>
      <stop offset="0.55" stop-color="#5cb226"/>
      <stop offset="1" stop-color="#2f7d12"/>
    </linearGradient>
    <linearGradient id="ubG-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f3f5f2"/>
      <stop offset="1" stop-color="#cdd5cc"/>
    </linearGradient>
    <linearGradient id="ubG-hill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4aa524"/>
      <stop offset="1" stop-color="#7ec64a"/>
    </linearGradient>
    <linearGradient id="ubG-pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aa39a"/>
      <stop offset="0.5" stop-color="#eef1ee"/>
      <stop offset="1" stop-color="#8b948b"/>
    </linearGradient>
  </defs>

  <!-- ground / hills -->
  <path d="M70 392 Q300 330 530 392 Q460 430 300 430 Q140 430 70 392 Z"
        fill="url(#ubG-hill)" stroke="#236b0d" stroke-width="7" stroke-linejoin="round"/>
  <path d="M120 388 Q300 352 480 388" fill="none" stroke="#bfe89a" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- flag pole rising through the B -->
  <line x1="356" y1="372" x2="346" y2="78" stroke="url(#ubG-pole)" stroke-width="11" stroke-linecap="round"/>
  <!-- green pennant flag -->
  <path d="M348 84 Q418 88 470 110 Q420 132 350 134 Z" fill="url(#ubG-green)" stroke="#236b0d" stroke-width="6" stroke-linejoin="round"/>

  <!-- U (silver) -->
  <text x="150" y="372" font-size="320" font-weight="800" fill="url(#ubG-silver)"
        stroke="#236b0d" stroke-width="9" paint-order="stroke" stroke-linejoin="round">U</text>
  <!-- B (green) -->
  <text x="330" y="372" font-size="320" font-weight="800" fill="url(#ubG-green)"
        stroke="#236b0d" stroke-width="9" paint-order="stroke" stroke-linejoin="round">B</text>
  <!-- dot between U and B baseline -->
  <circle cx="318" cy="352" r="17" fill="#236b0d"/>

  <!-- golf ball on the hill -->
  <circle cx="432" cy="360" r="17" fill="#eef6e6" stroke="#236b0d" stroke-width="4"/>

  <!-- Golf -->
  <text x="300" y="500" text-anchor="middle" font-size="150" font-weight="800"
        fill="#ffffff" stroke="#236b0d" stroke-width="9" paint-order="stroke"
        stroke-linejoin="round">Golf</text>

  <!-- Let's play tagline -->
  <line x1="155" y1="548" x2="205" y2="548" stroke="#3a8a1e" stroke-width="5" stroke-linecap="round"/>
  <line x1="395" y1="548" x2="445" y2="548" stroke="#3a8a1e" stroke-width="5" stroke-linecap="round"/>
  <text x="300" y="562" text-anchor="middle" font-size="46" font-weight="600"
        fill="#3a8a1e" font-style="italic">Let's play</text>
</svg>
