<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: linear-gradient(135deg, #16a34a, #15803d);
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #fff;
        cursor: pointer;
        user-select: none;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #t { font-size: 1.15rem; font-weight: 800; }
      #b { font-size: .95rem; opacity: .96; line-height: 1.35; }
      .hint { font-size: .72rem; opacity: .75; }
      .bar {
        height: 4px;
        background: rgba(255,255,255,.3);
        border-radius: 2px;
        margin-top: auto;
        overflow: hidden;
      }
      .bar > i {
        display: block;
        height: 100%;
        background: #fff;
        animation: shrink 10s linear forwards;
      }
      @keyframes shrink { from { width: 100%; } to { width: 0; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="t">🔔 Шинэ захиалга!</div>
      <div id="b"></div>
      <div class="hint">👆 Дарж нээх</div>
      <div class="bar"><i></i></div>
    </div>
  </body>
</html>
